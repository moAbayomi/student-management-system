{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}" />


    <script src="{% static 'js/htmx.min.js' %}" defer></script>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="min-h-screen bg-yellow-400 relative flex flex-col">
   <header class="fixed top-0 left-0 right-0 z-50">
  <div class="max-w-7xl mx-auto px-6 h-32 flex items-center justify-between">
 
    <!-- Left spacer keeps logo centered -->
    <div class="w-32"></div>
 
    <!-- Center: Logo -->
    <a href="#" class="text-lg font-semibold tracking-wide text-gray-900 whitespace-nowrap">
      School Name
    </a>
 
    <!-- Right: Enquire + Hamburger -->
    <div class="flex items-center gap-3 w-32 justify-end">
      <a href="#"
         class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">
        Enquire
      </a>
      <button id="mob-btn" class="flex flex-col gap-1.5 p-1 flex-shrink-0" aria-label="Open menu">
        <span class="block w-5 h-px bg-gray-900"></span>
        <span class="block w-5 h-px bg-gray-900"></span>
        <span class="block w-3 h-px bg-gray-900"></span>
      </button>
    </div>
 
  </div>
</header>

<nav class="fixed bottom-0 left-0 right-0 z-50"> 
  <div class="max-w-7xl mx-auto px-6 h-32 flex items-center justify-center gap-5">
    <button class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">home</button>
    <button class="text-xs tracking-widest w-8 h-[1px] rounded-full border"></button>
    <button class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">academic</button>
    <button class="text-xs tracking-widest w-8 h-[1px] rounded-full border"></button>
    <button class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">admissions</button>
    <button class="text-xs tracking-widest w-8 h-[1px] rounded-full border"></button>
    <button class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">contact</button>
    <button class="text-xs tracking-widest w-8 h-[1px] rounded-full border"></button>
    <a href="{%url 'portal:portal_home' %}" class="text-xs tracking-widest uppercase px-4 py-2 rounded-full border border-gray-900 text-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">e-portal</a>
  </div>
</nav>

    {% block content %}
    
    {% endblock %}
</body>
</html>
