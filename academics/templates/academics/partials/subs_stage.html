<div class="animate-in fade-in slide-in-from-bottom-1 duration-200">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-semibold text-slate-800">{{ category }}</h2>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="border-b border-slate-100">
          <th class="text-left px-6 py-4 text-[10px] uppercase tracking-widest text-slate-400 font-semibold w-24">Subject</th>
        </tr>
      </thead>

      <tbody id="arms-tbody">
        {% for subject in subjects %}
          {% include 'academics/partials/sub_row.html' with subject=subject %}
        {% empty %}
          
        {% endfor %}

       
      </tbody>

    
    </table>
  </div>

</div>
