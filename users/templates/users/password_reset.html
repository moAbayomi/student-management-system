{% extends "users/base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center bg-slate-50 px-4">
    <div class="w-full max-w-sm">
        <div class="bg-white py-10 px-8 shadow-2xl border border-slate-200 rounded-3xl">
            <h2 class="text-2xl font-black text-gray-900 tracking-tight mb-2">Reset Password</h2>
            <p class="text-sm text-gray-500 mb-8 font-medium">Enter your email and we'll send you a link to get back into your account.</p>
            
            <form method="POST" novalidate class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    {{ form.email }}
                    {% if form.email.errors %}
                        <p class="mt-2 text-[10px] text-red-500 font-bold uppercase">{{ form.email.errors.0 }}</p>
                    {% endif %}
                </div>
                <button type="submit" class="w-full py-4 px-4 rounded-2xl text-xs font-black text-white bg-gray-900 hover:bg-black transition-all uppercase tracking-[0.2em] shadow-lg">
                    Send Reset Link
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <a href="{% url 'users:login' %}" class="text-xs font-bold text-gray-400 hover:text-gray-900">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
