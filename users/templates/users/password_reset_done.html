{% extends "users/base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center bg-slate-50 px-4 text-center">
    <div class="w-full max-w-sm bg-white py-12 px-8 shadow-2xl border border-slate-200 rounded-3xl">
        <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h2 class="text-2xl font-black text-gray-900 tracking-tight mb-2">Check your inbox</h2>
        <p class="text-sm text-gray-500 font-medium mb-8">We've emailed instructions for setting a new password. If an account exists with this email, you'll receive it shortly.</p>
        <a href="{% url 'users:login' %}" class="inline-block text-xs font-black text-white bg-gray-900 px-8 py-4 rounded-2xl uppercase tracking-widest">Return to Login</a>
    </div>
</div>
{% endblock %}
