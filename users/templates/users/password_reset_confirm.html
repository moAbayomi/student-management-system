{% extends "users/base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center bg-slate-50 px-4">
    <div class="w-full max-w-md bg-white py-12 px-8 shadow-2xl border border-slate-200 rounded-3xl">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-gray-900 tracking-tight">Set New Password</h2>
            <p class="text-sm text-gray-500 font-medium mt-2">Please enter your new password below to regain access.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="mt-2 text-xs font-bold text-red-500">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="w-full bg-gray-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest hover:bg-black transition-all shadow-lg">
                Update Password
            </button>
        </form>

    </div>
</div>
{% endblock %}
