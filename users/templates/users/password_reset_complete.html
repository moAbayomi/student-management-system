{% extends "users/base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center bg-slate-50 px-4 text-center">
    <div class="w-full max-w-sm bg-white py-12 px-8 shadow-2xl border border-slate-200 rounded-3xl">
        <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-black text-gray-900 tracking-tight mb-2">Password Updated</h2>
        <p class="text-sm text-gray-500 font-medium mb-8">Your account is now secure. You can log in with your new password.</p>
        
        <a href="{% url 'users:login' %}" class="inline-block text-xs font-black text-white bg-green-600 px-8 py-4 rounded-2xl uppercase tracking-widest hover:bg-green-700 shadow-lg transition-all">
            Login Now
        </a>
    </div>
</div>
{% endblock %}
